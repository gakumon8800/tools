
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>賃貸トラブル診断ツール</title>
    <meta
      name="description"
      content="賃貸のトラブル状況を質問形式で診断し、管理会社への対応レベルを確認できる無料ツール。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>賃貸トラブル診断ツール</h1>
        <p>
          5つの質問に答えるだけで、現在の状況で必要な
          <strong>管理会社対応レベル</strong>を判定します。
        </p>
      </header>

      <section class="card" aria-labelledby="diagnosis-title">
        <h2 id="diagnosis-title">診断スタート</h2>

        <form id="diagnosisForm" novalidate>
          <fieldset class="question">
            <legend>1. 生活への支障の大きさは？</legend>
            <label><input type="radio" name="impact" value="3" required /> 生活がほぼ不可能（断水・停電・雨漏り等）</label>
            <label><input type="radio" name="impact" value="2" /> かなり困っている（騒音・設備故障等）</label>
            <label><input type="radio" name="impact" value="1" /> 軽度だが継続している</label>
          </fieldset>

          <fieldset class="question">
            <legend>2. トラブルの継続期間は？</legend>
            <label><input type="radio" name="duration" value="3" required /> 2週間以上</label>
            <label><input type="radio" name="duration" value="2" /> 3日〜2週間</label>
            <label><input type="radio" name="duration" value="1" /> 1〜2日</label>
          </fieldset>

          <fieldset class="question">
            <legend>3. これまでの連絡回数は？</legend>
            <label><input type="radio" name="contact" value="3" required /> 3回以上連絡したが進展なし</label>
            <label><input type="radio" name="contact" value="2" /> 1〜2回連絡した</label>
            <label><input type="radio" name="contact" value="1" /> まだ連絡していない</label>
          </fieldset>

          <fieldset class="question">
            <legend>4. 健康・安全面のリスクは？</legend>
            <label><input type="radio" name="risk" value="3" required /> 高い（カビ被害・防犯不安・ガス臭等）</label>
            <label><input type="radio" name="risk" value="2" /> ややある</label>
            <label><input type="radio" name="risk" value="1" /> 低い</label>
          </fieldset>

          <fieldset class="question">
            <legend>5. 証拠（写真・動画・記録）はある？</legend>
            <label><input type="radio" name="evidence" value="3" required /> 十分にある（日時付きで整理済み）</label>
            <label><input type="radio" name="evidence" value="2" /> 一部ある</label>
            <label><input type="radio" name="evidence" value="1" /> まだ用意していない</label>
          </fieldset>

          <p id="formError" class="error" role="alert" aria-live="polite"></p>

          <div class="actions">
            <button type="submit">診断する</button>
            <button type="reset" class="secondary">リセット</button>
          </div>
        </form>
      </section>

      <section id="result" class="card hidden" aria-live="polite">
        <h2>診断結果</h2>
        <p class="badge" id="levelBadge"></p>
        <p id="resultMessage"></p>
        <ul id="resultActions"></ul>
        <small>
          ※本ツールは一般的な目安です。緊急性が高い場合は自治体窓口・専門家へ相談してください。
        </small>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
